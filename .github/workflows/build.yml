name: Auto Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build
      run: node build.js
    
    - name: Upload userscript
      uses: actions/upload-artifact@v4
      with:
        name: modmenu.user.js
        path: dist/modmenu.user.js
